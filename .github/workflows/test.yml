name: API Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout test repo
        uses: actions/checkout@v4

      - name: Checkout API repo
        uses: actions/checkout@v4
        with:
          repository: blazeiron1/propeller-sdet-task-BLAGOJA-MITRESKI
          path: api

      - name: Start API with Docker
        working-directory: api
        run: |
          docker compose up --build -d
          sleep 20

      - name: Seed database
        working-directory: api
        run: docker compose run --rm seed

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build (compile TypeScript)
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test
