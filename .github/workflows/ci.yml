name: CI Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Compile TypeScript
        run: npx tsc --noEmit

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Start API with Docker
        working-directory: api
        run: docker compose up --build -d

      - name: Wait for API to be ready
        run: |
          echo "Waiting for API to be ready..."
          for i in $(seq 1 30); do
            if curl -sf -X POST http://localhost:3000/graphql \
                 -H "Content-Type: application/json" \
                 -d '{"query":"{__typename}"}' > /dev/null 2>&1; then
              echo "API is ready (attempt $i)"
              exit 0
            fi
            echo "Attempt $i/30 — retrying in 3s..."
            sleep 3
          done
          echo "API did not become ready within 90s"
          docker compose -f api/docker-compose.yml logs
          exit 1

      - name: Seed database
        working-directory: api
        run: docker compose --profile seed run --rm seed

      - name: Run tests
        run: npm test

      - name: Show Docker logs on failure
        if: failure()
        working-directory: api
        run: docker compose logs
