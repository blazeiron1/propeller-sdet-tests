version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: propeller
      POSTGRES_PASSWORD: propeller
      POSTGRES_DB: propeller
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U propeller']
      interval: 3s
      timeout: 3s
      retries: 10

  api:
    build: .
    ports:
      - '3000:3000'
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USERNAME: propeller
      DB_PASSWORD: propeller
      DB_DATABASE: propeller
    depends_on:
      db:
        condition: service_healthy

  seed:
    build: .
    command: npx ts-node -r tsconfig-paths/register src/seed.ts
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USERNAME: propeller
      DB_PASSWORD: propeller
      DB_DATABASE: propeller
    depends_on:
      api:
        condition: service_started
    restart: 'no'
    profiles:
      - seed

volumes:
  pgdata:
